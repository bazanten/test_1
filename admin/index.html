<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administratora | Warsztat</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="nc-root"></div>
  
  <!-- Ładowanie Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Skrypt, który brutalnie wstrzykuje style wprost do struktur CMS po jego uruchomieniu -->
  <script>
    const style = document.createElement('style');
    style.innerHTML = `
      @media (max-width: 768px) {
        html, body, #nc-root, #nc-root > div {
          width: 100vw !important;
          max-width: 100vw !important;
          overflow-x: hidden !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        
        /* Wymuszenie pionowego układu zamiast dwóch kolumn */
        div[class*="AppMainContainer"], 
        div[class*="EditorContainer"], 
        div[class*="CollectionContainer"],
        div[class*="EditorFormContainer"] {
          display: flex !important;
          flex-direction: column !important;
          width: 100% !important;
          max-width: 100% !important;
          padding: 10px !important;
          position: static !important;
        }

        /* Wyłączenie podglądu rozpychającego ekran */
        div[class*="EditorPreviewPaneContainer"],
        section[class*="PreviewPaneContainer"],
        div[class*="EditorPreviewPane"] {
          display: none !important;
          width: 0 !important;
        }

        /* Dostosowanie paska górnego z przyciskiem Publish */
        div[class*="TopBarContainer"] {
          width: 100% !important;
          max-width: 100% !important;
          padding: 10px !important;
          height: auto !important;
          position: relative !important;
        }

        /* Ogromne przyciski ułatwiające pracę w warsztacie */
        button, a[class*="Button"] {
          width: 100% !important;
          min-height: 50px !important;
          margin: 5px 0 !important;
          font-size: 16px !important;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
